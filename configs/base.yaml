# Global base configuration for the TADA project.
# All experiments inherit from this file.

# Output directory — respects TADA_WORKDIR env var, falls back to <cwd>/outputs.
workdir: ${oc.env:TADA_WORKDIR,${hydra:runtime.cwd}/outputs}

# Reproducibility seed (used across patching, CAA, and SAE pipelines).
seed: 42

# Compute device.  Override with TADA_DEVICE=cpu or device=cpu at the CLI.
device: ${oc.env:TADA_DEVICE,cuda}

# DataLoader parallelism.
num_workers: 4
